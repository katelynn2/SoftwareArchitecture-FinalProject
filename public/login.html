<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center font-sans relative overflow-hidden">

  <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border border-gray-200 z-10">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-blue-900">Admin Portal</h1>
    </div>

    <form id="loginForm">
      <div class="mb-5">
        <label class="block text-sm font-semibold mb-2 text-gray-700">Username</label>
        <input type="text" id="username" required class="w-full p-3 border border-gray-300 rounded focus:ring-2 focus:ring-blue-900 outline-none">
      </div>

      <div class="mb-6">
        <label class="block text-sm font-semibold mb-2 text-gray-700">Password</label>
        <input type="password" id="password" required class="w-full p-3 border border-gray-300 rounded focus:ring-2 focus:ring-blue-900 outline-none">
      </div>

      <button type="submit" class="w-full bg-blue-900 text-white font-bold py-3 rounded hover:bg-blue-800 transition shadow-md">
        Login
      </button>
    </form>
  </div>

  <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-3"></div>

  <script>
    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      
      toast.className = `px-6 py-3 rounded shadow-lg text-white font-bold transition-all duration-300 transform translate-y-10 opacity-0 flex items-center gap-2`;
      if (type === 'success') toast.classList.add('bg-green-600');
      if (type === 'error') toast.classList.add('bg-red-600');

      toast.innerHTML = message;
      container.appendChild(toast);

      setTimeout(() => toast.classList.remove('translate-y-10', 'opacity-0'), 10);
      setTimeout(() => {
        toast.classList.add('translate-y-10', 'opacity-0');
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const payload = {
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      };

      try {
        const response = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (response.ok) {
          const data = await response.json();
          localStorage.setItem('adminToken', data.token);
          
          showToast('Login success', 'success');
          
          setTimeout(() => {
            window.location.href = '/admin.html';
          }, 1000);
        } else {
          showToast('Wrong username or password!', 'error');
        }
      } catch (error) {
        showToast('Failed to connect to the server', 'error');
      }
    });
  </script>
</body>
</html>
